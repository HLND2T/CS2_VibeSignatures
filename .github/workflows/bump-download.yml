name: Bump Download

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: bump-download-${{ github.repository }}
  cancel-in-progress: false

jobs:
  bump:
    if: github.repository == 'HLND2T/CS2_VibeSignatures' || github.repository == 'hzqst/CS2_VibeSignatures'
    environment: win64
    runs-on: [self-hosted, windows, x64]
    env:
      STEAM_USERNAME: ${{ secrets.STEAM_USERNAME }}
      STEAM_PASSWORD: ${{ secrets.STEAM_PASSWORD }}
      PERSISTED_WORKSPACE: ${{ secrets.PERSISTED_WORKSPACE }}
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          submodules: true

      - name: Synchronize git refs
        shell: pwsh
        run: |
          $workspace = (Resolve-Path -LiteralPath $env:GITHUB_WORKSPACE).Path -replace '\\', '/'
          git config --global --add safe.directory "$workspace"
          git fetch origin --prune --prune-tags --tags "+refs/heads/*:refs/remotes/origin/*"

      - name: Configure git
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Preview download bump
        id: preview
        shell: pwsh
        run: uv run bump_download.py -config download.yaml -depotdir cs2_depot -username "$env:STEAM_USERNAME" -password "$env:STEAM_PASSWORD" -remember-password -dry-run -github-output "$env:GITHUB_OUTPUT"

      - name: Check duplicate bump target
        id: duplicate
        if: steps.preview.outputs.updated == 'true'
        uses: actions/github-script@v7
        env:
          BUMP_TAG: ${{ steps.preview.outputs.tag }}
        with:
          script: |
            const tag = process.env.BUMP_TAG;
            if (!tag || !tag.trim()) {
              throw new Error('steps.preview.outputs.tag is empty.');
            }

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const title = `chore(download): Update manifest for ${tag}`;

            try {
              await github.rest.git.getRef({
                owner,
                repo,
                ref: `tags/${tag}`,
              });
              core.notice(`Tag ${tag} already exists. Skipping bump pull request.`);
              core.setOutput('skip_pr', 'true');
              core.setOutput('reason', 'tag_exists');
              return;
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
            }

            const pulls = await github.paginate(github.rest.pulls.list, {
              owner,
              repo,
              state: 'open',
              per_page: 100,
            });
            const existingPull = pulls.find((pull) => pull.title === title);

            if (existingPull) {
              core.notice(`Bump pull request already exists: ${existingPull.html_url}`);
              core.setOutput('skip_pr', 'true');
              core.setOutput('reason', 'pull_request_exists');
              return;
            }

            core.setOutput('skip_pr', 'false');

      - name: Bump download config
        id: bump
        if: steps.preview.outputs.updated != 'true' || steps.duplicate.outputs.skip_pr != 'true'
        shell: pwsh
        run: uv run bump_download.py -config download.yaml -depotdir cs2_depot -username "$env:STEAM_USERNAME" -password "$env:STEAM_PASSWORD" -remember-password -github-output "$env:GITHUB_OUTPUT"

      - name: Push bump branch
        if: steps.bump.outputs.updated == 'true' && steps.bump.outputs.repair_tag != 'true' && steps.duplicate.outputs.skip_pr != 'true'
        id: branch
        shell: pwsh
        run: |
          $tag = "${{ steps.bump.outputs.tag }}"
          if ([string]::IsNullOrWhiteSpace($tag)) {
            throw "steps.bump.outputs.tag is empty."
          }

          $branch = "bump-download/$tag"
          git push --force-with-lease origin "HEAD:refs/heads/$branch"
          if ($LASTEXITCODE -ne 0) {
            throw "Failed to push bump branch $branch."
          }

          "branch=$branch" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Create or update bump pull request
        if: steps.bump.outputs.updated == 'true' && steps.bump.outputs.repair_tag != 'true' && steps.duplicate.outputs.skip_pr != 'true'
        uses: actions/github-script@v7
        env:
          BUMP_TAG: ${{ steps.bump.outputs.tag }}
          BUMP_BRANCH: ${{ steps.branch.outputs.branch }}
        with:
          script: |
            const tag = process.env.BUMP_TAG;
            const branch = process.env.BUMP_BRANCH;
            if (!tag || !tag.trim()) {
              throw new Error('steps.bump.outputs.tag is empty.');
            }
            if (!branch || !branch.trim()) {
              throw new Error('steps.branch.outputs.branch is empty.');
            }

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const title = `chore(download): Update manifest for ${tag}`;

            try {
              await github.rest.git.getRef({
                owner,
                repo,
                ref: `tags/${tag}`,
              });
              core.notice(`Tag ${tag} already exists. Skipping bump pull request.`);
              return;
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
            }

            const pulls = await github.paginate(github.rest.pulls.list, {
              owner,
              repo,
              state: 'open',
              per_page: 100,
            });
            const existingPull = pulls.find((pull) => {
              if (pull.title === title) {
                return true;
              }
              return pull.base.ref === 'main' &&
                pull.head.ref === branch &&
                pull.head.repo?.full_name === `${owner}/${repo}`;
            });

            if (existingPull) {
              core.notice(`Bump pull request already exists: ${existingPull.html_url}`);
              return;
            }

            const { data: pull } = await github.rest.pulls.create({
              owner,
              repo,
              base: 'main',
              head: branch,
              title,
              body: [
                `Automated download bump for tag \`${tag}\`.`,
                '',
                'After this PR is merged, the post-merge workflow will create the tag and dispatch `build-on-self-runner`.',
                '',
                `<!-- bump-download-tag: ${tag} -->`,
              ].join('\n'),
            });

            core.notice(`Created bump pull request: ${pull.html_url}`);

      - name: Push repaired tag and dispatch build
        if: steps.bump.outputs.updated == 'true' && steps.bump.outputs.repair_tag == 'true'
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ steps.bump.outputs.tag }}"
          if ([string]::IsNullOrWhiteSpace($tag)) {
            throw "steps.bump.outputs.tag is empty."
          }

          $headSha = git rev-parse HEAD
          if ($LASTEXITCODE -ne 0) {
            throw "Failed to resolve HEAD."
          }

          $existingTag = git ls-remote --tags origin "refs/tags/$tag"
          if ($LASTEXITCODE -ne 0) {
            throw "Failed to query remote tag $tag."
          }

          if ([string]::IsNullOrWhiteSpace($existingTag)) {
            git push origin "refs/tags/$tag"
            if ($LASTEXITCODE -ne 0) {
              throw "Failed to push repaired tag $tag."
            }
          } else {
            $existingSha = ($existingTag -split "\s+")[0]
            if ($existingSha -ne $headSha) {
              throw "Remote tag $tag already exists at $existingSha, expected $headSha."
            }

            Write-Host "Remote tag $tag already points to $headSha."
          }

          $payload = @{
            event_type = "build-on-self-runner"
            client_payload = @{
              tag = $tag
              merge_sha = $headSha
              repair_tag = $true
            }
          } | ConvertTo-Json -Depth 5

          $headers = @{
            Authorization = "Bearer $env:GITHUB_TOKEN"
            Accept = "application/vnd.github+json"
            "X-GitHub-Api-Version" = "2022-11-28"
          }

          Invoke-RestMethod `
            -Method Post `
            -Uri "https://api.github.com/repos/${{ github.repository }}/dispatches" `
            -Headers $headers `
            -ContentType "application/json" `
            -Body $payload

          Write-Host "Dispatched build-on-self-runner for repaired tag $tag."
